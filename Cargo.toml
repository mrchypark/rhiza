[workspace]
members = [
    "crates/queqlite-core",
    "crates/queqlite-quepaxa",
    "crates/queqlite-testkit",
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "MIT"
repository = "https://github.com/mrchypark/queqlite"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
tempfile = "3"
