apiVersion: batch/v1
kind: Job
metadata:
  name: __JOB_NAME__
  labels:
    app.kubernetes.io/name: queqlite-object-admin
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 600
  template:
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      restartPolicy: Never
      containers:
        - name: queqlite
          image: __QUEQLITE_IMAGE__
          imagePullPolicy: IfNotPresent
          args: __COMMAND_JSON__
          env:
            - name: QUEQLITE_CLUSTER_ID
              value: __CLUSTER_ID__
            - name: QUEQLITE_EPOCH
              value: "__EPOCH__"
            - name: QUEQLITE_CONFIG_BUNDLE_FILE
              value: /etc/queqlite/config/config.json
            - name: QUEQLITE_OBJECT_STORE
              value: s3
            - name: QUEQLITE_S3_BUCKET
              value: __S3_BUCKET__
            - name: QUEQLITE_S3_REGION
              value: __S3_REGION__
            - name: QUEQLITE_S3_ALLOW_HTTP
              value: "__S3_ALLOW_HTTP__"
            - name: QUEQLITE_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: __OBJECT_SECRET__
                  key: access-key
                  optional: true
            - name: QUEQLITE_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: __OBJECT_SECRET__
                  key: secret-key
                  optional: true
            - name: QUEQLITE_RECOVERY_GENERATION
              value: "__RECOVERY_GENERATION__"
          volumeMounts:
            - name: config
              mountPath: /etc/queqlite/config
              readOnly: true
      volumes:
        - name: config
          secret:
            secretName: __BUNDLE_SECRET__
