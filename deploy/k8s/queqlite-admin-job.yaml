apiVersion: batch/v1
kind: Job
metadata:
  name: __JOB_NAME__
  labels:
    app.kubernetes.io/name: queqlite-live-admin
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 120
  ttlSecondsAfterFinished: 600
  template:
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      restartPolicy: Never
      containers:
        - name: curl
          image: __CURL_IMAGE__
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-ec"]
          args:
            - |
              exec curl --fail-with-body --silent --show-error \
                --connect-timeout 5 --max-time 90 \
                -X '__METHOD__' \
                -H "Authorization: Bearer ${QUEQLITE_ADMIN_TOKEN}" \
                -H 'x-queqlite-version: 1' \
                -H 'Content-Type: application/json' \
                --data '__BODY__' \
                'http://__POD__.__SERVICE__:8080__PATH__'
          env:
            - name: QUEQLITE_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: __AUTH_SECRET__
                  key: admin-token
