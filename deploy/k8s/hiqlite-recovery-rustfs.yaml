apiVersion: v1
kind: Secret
metadata:
  name: rustfs-credentials
type: Opaque
stringData:
  access-key: rustfsadmin
  secret-key: rustfsadmin
---
apiVersion: v1
kind: Service
metadata:
  name: rustfs
spec:
  selector:
    app.kubernetes.io/name: rustfs
    app.kubernetes.io/component: object-store
  ports:
    - name: s3
      port: 9000
      targetPort: s3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rustfs
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rustfs
      app.kubernetes.io/component: object-store
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rustfs
        app.kubernetes.io/component: object-store
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: rustfs
          image: __RUSTFS_IMAGE__
          imagePullPolicy: IfNotPresent
          args: ["/data"]
          env:
            - name: RUSTFS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: rustfs-credentials
                  key: access-key
            - name: RUSTFS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: rustfs-credentials
                  key: secret-key
          ports:
            - name: s3
              containerPort: 9000
          readinessProbe:
            tcpSocket:
              port: s3
            initialDelaySeconds: 2
            periodSeconds: 2
          livenessProbe:
            tcpSocket:
              port: s3
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir:
            sizeLimit: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rustfs-tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rustfs
      app.kubernetes.io/component: tools
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rustfs
        app.kubernetes.io/component: tools
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      containers:
        - name: aws-cli
          image: __AWS_CLI_IMAGE__
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-ec"]
          args: ["exec sleep 2147483647"]
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: rustfs-credentials
                  key: access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: rustfs-credentials
                  key: secret-key
            - name: AWS_DEFAULT_REGION
              value: us-east-1
            - name: AWS_EC2_METADATA_DISABLED
              value: "true"
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: rustfs-create-hiqlite-bucket
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 180
  template:
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      restartPolicy: Never
      containers:
        - name: aws-cli
          image: __AWS_CLI_IMAGE__
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-ec"]
          args:
            - |
              ready=false
              for attempt in $(seq 1 90); do
                if aws --endpoint-url http://rustfs:9000 s3api list-buckets >/dev/null 2>&1; then
                  ready=true
                  break
                fi
                sleep 1
              done
              "$ready" || { echo "RustFS did not become ready" >&2; exit 1; }
              aws --endpoint-url http://rustfs:9000 s3api head-bucket --bucket hiqlite >/dev/null 2>&1 \
                || aws --endpoint-url http://rustfs:9000 s3api create-bucket --bucket hiqlite
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: rustfs-credentials
                  key: access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: rustfs-credentials
                  key: secret-key
            - name: AWS_DEFAULT_REGION
              value: us-east-1
            - name: AWS_EC2_METADATA_DISABLED
              value: "true"
