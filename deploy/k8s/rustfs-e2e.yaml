apiVersion: v1
kind: Secret
metadata:
  name: rustfs-credentials
type: Opaque
stringData:
  access-key: rustfsadmin
  secret-key: rustfsadmin
---
apiVersion: v1
kind: Service
metadata:
  name: rustfs
spec:
  selector:
    app.kubernetes.io/name: rustfs
  ports:
    - name: s3
      port: 9000
      targetPort: s3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rustfs
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rustfs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rustfs
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: rustfs
          image: __RUSTFS_IMAGE__
          imagePullPolicy: IfNotPresent
          args: ["/data"]
          ports:
            - name: s3
              containerPort: 9000
          env:
            - name: RUSTFS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: rustfs-credentials
                  key: access-key
            - name: RUSTFS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: rustfs-credentials
                  key: secret-key
          livenessProbe:
            tcpSocket:
              port: s3
            initialDelaySeconds: 5
            periodSeconds: 5
          readinessProbe:
            tcpSocket:
              port: s3
            initialDelaySeconds: 2
            periodSeconds: 2
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: rustfs-create-bucket
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 180
  template:
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      restartPolicy: Never
      containers:
        - name: aws-cli
          image: __AWS_CLI_IMAGE__
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              ready=false
              for attempt in $(seq 1 90); do
                if aws --endpoint-url http://rustfs:9000 s3api list-buckets >/dev/null 2>&1; then
                  ready=true
                  break
                fi
                sleep 1
              done
              "$ready" || { echo "RustFS did not become ready" >&2; exit 1; }
              aws --endpoint-url http://rustfs:9000 s3api head-bucket --bucket queqlite >/dev/null 2>&1 \
                || aws --endpoint-url http://rustfs:9000 s3api create-bucket --bucket queqlite
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: rustfs-credentials
                  key: access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: rustfs-credentials
                  key: secret-key
            - name: AWS_DEFAULT_REGION
              value: us-east-1
            - name: AWS_EC2_METADATA_DISABLED
              value: "true"
